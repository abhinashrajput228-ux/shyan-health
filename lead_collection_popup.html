<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Popup Lead Form - Ready to Use</title>
<style>
  :root {
    --primary-color: #1D9E75;
    --hover-color: #167e5d;
    --bg-overlay: rgba(0, 0, 0, 0.7);
    --text-dark: #333;
    --text-light: #666;
  }

  /* Popup Overlay */
  .lead-popup-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: var(--bg-overlay);
    backdrop-filter: blur(5px);
    z-index: 9999;
    justify-content: center;
    align-items: center;
    font-family: 'Inter', -apple-system, sans-serif;
  }
  
  /* Popup Content */
  .lead-popup-box {
    background: #fff;
    padding: 35px;
    border-radius: 15px;
    width: 90%;
    max-width: 420px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    position: relative;
    animation: slideUp 0.4s ease-out;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .lead-close-btn {
    position: absolute;
    top: 15px; right: 20px;
    font-size: 28px;
    cursor: pointer;
    border: none;
    background: none;
    color: #aaa;
    transition: color 0.2s;
  }
  .lead-close-btn:hover { color: #333; }

  .lead-popup-box h2 {
    margin: 0 0 10px;
    color: var(--primary-color);
    font-size: 24px;
    text-align: center;
  }

  .lead-popup-box p {
    color: var(--text-light);
    text-align: center;
    margin-bottom: 25px;
    font-size: 14px;
  }

  .lead-form-group {
    margin-bottom: 18px;
  }
  .lead-form-group label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
    color: var(--text-dark);
    font-size: 13px;
  }
  .lead-form-group input, 
  .lead-form-group textarea {
    width: 100%;
    padding: 12px;
    border: 1.5px solid #eee;
    border-radius: 8px;
    font-size: 15px;
    background: #f9f9f9;
    transition: all 0.3s;
  }
  .lead-form-group input:focus, 
  .lead-form-group textarea:focus {
    border-color: var(--primary-color);
    background: #fff;
    outline: none;
    box-shadow: 0 0 0 3px rgba(29, 158, 117, 0.1);
  }

  .lead-submit-btn {
    background: var(--primary-color);
    color: white;
    border: none;
    padding: 14px;
    border-radius: 8px;
    cursor: pointer;
    width: 100%;
    font-size: 16px;
    font-weight: 700;
    margin-top: 10px;
    transition: background 0.3s, transform 0.2s;
  }
  .lead-submit-btn:hover {
    background: var(--hover-color);
    transform: translateY(-1px);
  }
  .lead-submit-btn:active { transform: translateY(0); }
  .lead-submit-btn:disabled {
    background: #ccc;
    cursor: not-allowed;
  }

  #lead-status {
    margin-top: 15px;
    text-align: center;
    font-weight: 600;
    font-size: 14px;
  }

  /* Floating Trigger Button */
  .lead-floating-btn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--primary-color);
    color: white;
    padding: 15px 25px;
    border-radius: 50px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 20px rgba(29, 158, 117, 0.4);
    z-index: 999;
    border: none;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: transform 0.3s;
  }
  .lead-floating-btn:hover { transform: scale(1.05); }
</style>
</head>
<body>

<!-- Floating button to open the popup -->
<button class="lead-floating-btn" onclick="openLeadPopup()">
  <span>Get Free Consultation</span>
</button>

<!-- The Popup Modal -->
<div id="leadPopup" class="lead-popup-overlay">
  <div class="lead-popup-box">
    <button class="lead-close-btn" onclick="closeLeadPopup()">&times;</button>
    <h2>Consult with Experts</h2>
    <p>Leave your details and we will get back to you shortly.</p>
    
    <form id="leadForm">
      <div class="lead-form-group">
        <label>Full Name *</label>
        <input type="text" name="name" placeholder="Enter your name" required>
      </div>
      <div class="lead-form-group">
        <label>Email Address *</label>
        <input type="email" name="email" placeholder="Enter your email" required>
      </div>
      <div class="lead-form-group">
        <label>Phone Number</label>
        <input type="tel" name="phone" placeholder="Enter mobile number">
      </div>
      <div class="lead-form-group">
        <label>How can we help?</label>
        <textarea name="message" rows="3" placeholder="Briefly describe your concern"></textarea>
      </div>
      
      <button type="submit" class="lead-submit-btn" id="leadSubmitBtn">Submit Request</button>
      <div id="lead-status"></div>
    </form>
  </div>
</div>

<script>
  // Your Google Apps Script Web App URL
  const scriptURL = 'https://script.google.com/macros/s/AKfycbyYohbkW1Jr_N0VySMJtAzkEbsNtVj5E6YbN3uLZgbYILlkICq4a3ubBVeR5TPlqUqW/exec';
  
  const form = document.getElementById('leadForm');
  const btn = document.getElementById('leadSubmitBtn');
  const status = document.getElementById('lead-status');
  const popup = document.getElementById('leadPopup');

  function openLeadPopup() {
    popup.style.display = 'flex';
  }

  function closeLeadPopup() {
    popup.style.display = 'none';
  }

  form.addEventListener('submit', e => {
    e.preventDefault();
    btn.disabled = true;
    btn.innerText = 'Submitting...';
    
    fetch(scriptURL, { 
      method: 'POST', 
      body: new FormData(form),
      mode: 'no-cors' 
    })
    .then(() => {
      status.innerText = '✅ Thank you! We will contact you soon.';
      status.style.color = '#1D9E75';
      form.reset();
      setTimeout(() => {
        closeLeadPopup();
        btn.disabled = false;
        btn.innerText = 'Submit Request';
        status.innerText = '';
      }, 3000);
    })
    .catch(error => {
      status.innerText = '❌ Error. Please try again later.';
      status.style.color = '#e74c3c';
      btn.disabled = false;
      btn.innerText = 'Submit Request';
      console.error('Error!', error.message);
    });
  });
</script>

</body>
</html>
